<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pria Kesayanganku ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  overflow:hidden;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#ffb6d9,#c8b6ff,#9ad7ff);
  color:white;
}


/* bintang bergerak */

.star{
  position:absolute;
  width:4px;
  height:4px;
  background:white;
  border-radius:50%;
  animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
  from{opacity:.2; transform:scale(.5);}
  to{opacity:1; transform:scale(1.5);}
}


/* bubble */

.bubble{
 position:absolute;
 bottom:-100px;
 width:40px;
 height:40px;
 border-radius:50%;
 background:rgba(255,255,255,.25);
 animation:naik 10s infinite;
}

@keyframes naik{
 from{
  transform:translateY(0);
 }
 to{
  transform:translateY(-120vh);
 }
}


/* container */

.container{
 position:relative;
 z-index:5;
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 text-align:center;
 padding:20px;
}


/* kartu */

.card{
 background:rgba(255,255,255,.2);
 backdrop-filter:blur(10px);
 border-radius:30px;
 padding:30px;
 box-shadow:0 0 30px rgba(255,255,255,.4);
}


/* judul */

h1{
 font-family:'Dancing Script',cursive;
 font-size:45px;
 margin:10px;
}


button{
 border:none;
 padding:15px 30px;
 border-radius:30px;
 background:#ff4f9a;
 color:white;
 font-size:16px;
 cursor:pointer;
}

</style>

</head>


<body>


<div class="star" style="top:20%;left:20%"></div>
<div class="star" style="top:70%;left:80%"></div>
<div class="star" style="top:40%;left:50%"></div>


<div class="bubble" style="left:20%;animation-delay:2s"></div>
<div class="bubble" style="left:70%;animation-delay:5s"></div>
<div class="bubble" style="left:90%;animation-delay:1s"></div>


<div class="container">

<div class="card">

<h1>Untuk Pria Kesayanganku ❤️</h1>

<p>
Sebuah kejutan kecil khusus untukmu...
</p>


<button>
Buka Pesan 💌
</button>


</div>

</div>


</body>
</html>
